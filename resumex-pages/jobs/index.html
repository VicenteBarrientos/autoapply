<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ResumeX — Job Queue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { padding: 20px 24px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 20px; color: #f8fafc; }
    nav a { color: #94a3b8; text-decoration: none; margin-left: 16px; font-size: 14px; }
    nav a:hover { color: #fff; }
    main { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 12px; }
    input, select, button { font-size: 14px; border-radius: 8px; border: 1px solid #475569; padding: 8px 12px; background: #0f172a; color: #e2e8f0; }
    button { cursor: pointer; font-weight: 600; background: #4338ca; border-color: #4338ca; }
    button:hover { background: #3730a3; }
    button.secondary { background: #334155; border-color: #475569; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    #msg { min-height: 20px; font-size: 13px; margin-bottom: 12px; }
    #msg.err { color: #f87171; }
    #msg.ok { color: #4ade80; }
    .job { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
    .job h3 { font-size: 16px; color: #f1f5f9; }
    .meta { font-size: 13px; color: #94a3b8; margin: 4px 0 10px; }
    .tags span { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; margin-right: 6px; background: #334155; color: #cbd5e1; }
    .tags .auto { background: #1e3a5f; color: #93c5fd; }
    .tags .score { background: #422006; color: #fcd34d; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .actions button { font-size: 12px; padding: 6px 12px; }
    .hint { font-size: 12px; color: #64748b; margin-top: 8px; }
    .empty { text-align: center; padding: 48px; color: #64748b; }
  </style>
</head>
<body>
  <header>
    <h1>ResumeX Job Queue</h1>
    <nav>
      <a href="/autoapply">AutoApply</a>
      <a href="/">Home</a>
    </nav>
  </header>

  <main>
    <div class="panel">
      <h2>Backend (for search &amp; match)</h2>
      <div class="row">
        <input type="url" id="backend-url" placeholder="Backend URL" style="flex:2;min-width:200px" />
        <input type="password" id="backend-secret" placeholder="AUTOAPPLY_SECRET" style="flex:1;min-width:140px" />
        <button type="button" id="save-settings" class="secondary">Save</button>
      </div>
      <p class="hint">Uses the same backend as AutoApply. CORS must be enabled (default).</p>
    </div>

    <div class="panel">
      <h2>Discover</h2>
      <input type="text" id="greenhouse-boards" placeholder="Greenhouse: stripe, figma, …" style="width:100%" />
      <input type="text" id="lever-boards" placeholder="Lever: netflix, palantir, …" style="width:100%;margin-top:8px" />
      <div class="row">
        <button type="button" id="search-btn">Search jobs</button>
        <button type="button" id="refresh-btn" class="secondary">Refresh list</button>
      </div>
    </div>

    <p id="msg"></p>
    <div id="jobs"></div>
    <div class="empty" id="empty" hidden>No jobs yet — run a search or use the AutoApply extension.</div>
  </main>

  <!-- Deploy this page to ResumeX at /jobs — shares localStorage with resumex-bridge -->
  <script src="jobs-page.js"></script>
</body>
</html>
